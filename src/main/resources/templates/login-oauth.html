<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        body { font-family: Arial; padding: 40px; text-align: center; }
        .oauth-buttons { margin: 20px 0; }
        .oauth-btn {
            display: inline-block;
            padding: 12px 24px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .google { background: #db4437; }
        .google:hover { background: #c23321; }
        .github { background: #333; }
        .github:hover { background: #222; }
        .facebook { background: #4267B2; }
        .facebook:hover { background: #365899; }
        .divider { margin: 30px 0; border-top: 1px solid #ddd; }
        .form-login-link {
            display: inline-block;
            padding: 10px 20px;
            background: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<h1>🔐 Choose Login Method</h1>

<div class="oauth-buttons">
    <h3>Login with Social:</h3>

    <a th:href="@{/oauth2/authorization/google}" class="oauth-btn google">
        <img src="https://img.icons8.com/color/16/000000/google-logo.png" alt="G">
        Sign in with Google
    </a>

    <a th:href="@{/oauth2/authorization/github}" class="oauth-btn github">
        <img src="https://img.icons8.com/ios-glyphs/16/ffffff/github.png" alt="GH">
        Sign in with GitHub
    </a>

    <a th:href="@{/oauth2/authorization/facebook}" class="oauth-btn facebook">
        <img src="https://img.icons8.com/color/16/000000/facebook.png" alt="FB">
        Sign in with Facebook
    </a>
</div>

<div class="divider">
    <span>OR</span>
</div>

<div>
    <h3>Traditional Login:</h3>
    <a href="/login/form" class="form-login-link">
        📝 Login with Email/Password
    </a>
</div>
</body>
</html>
