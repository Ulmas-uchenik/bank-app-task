<!DOCTYPE html>
<html>
<head>
    <title>Вход в систему</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .error {
            color: red;
            background: #ffe6e6;
            padding: 10px;
            border-radius: 3px;
            margin-bottom: 15px;
        }
        .success {
            color: green;
            background: #e6ffe6;
            padding: 10px;
            border-radius: 3px;
            margin-bottom: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 3px;
            box-sizing: border-box;
        }
        button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
<h2>🔐 Вход в систему</h2>

<!-- Сообщение об ошибке -->
<div th:if="${errorMessage}" class="error">
    [[${errorMessage}]]
</div>

<!-- Сообщение об успешном выходе -->
<div th:if="${successMessage}" class="success">
    [[${successMessage}]]
</div>

<!-- ФОРМА ЛОГИНА -->
<!-- Важно: action должен совпадать с loginProcessingUrl! -->
<form action="/login" method="post">
    <div class="form-group">
        <label for="username">Логин:</label>
        <input type="text"
               id="username"
               name="username"
               placeholder="Введите логин"
               required>
    </div>

    <div class="form-group">
        <label for="password">Пароль:</label>
        <input type="password"
               id="password"
               name="password"
               placeholder="Введите пароль"
               required>
    </div>

    <button type="submit">Войти</button>
</form>

<hr>

<p style="text-align: center; color: #666; font-size: 14px;">
    Тестовые данные:<br>
    Логин: <strong>test</strong><br>
    Пароль: <strong>123</strong>
</p>
</body>
</html>
